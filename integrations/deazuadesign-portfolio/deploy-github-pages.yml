# Save as: deazuadesign-portfolio/.github/workflows/deploy-github-pages.yml
#
# Uses `git clone` instead of actions/checkout for the Spanish repo so public
# repos work even when the GitHub API token cannot read cross-repo metadata.
# Private Spanish repo: set secret SPANISH_REPO_TOKEN (fine-grained PAT, read).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deazuadesign-portfolio
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout portfolio
        uses: actions/checkout@v4

      - name: Fetch Spanish app
        env:
          PAT: ${{ secrets.SPANISH_REPO_TOKEN }}
        run: |
          rm -rf spanish-app
          if [ -n "$PAT" ]; then
            git clone --depth 1 "https://x-access-token:${PAT}@github.com/rlopezde-ops/el-camino-del-guerrero.git" spanish-app
          else
            git clone --depth 1 https://github.com/rlopezde-ops/el-camino-del-guerrero.git spanish-app
          fi
          test -f spanish-app/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: spanish-app/package-lock.json

      - name: Build Spanish app (subpath /deazuadesign-portfolio/apps/spanish/)
        working-directory: spanish-app
        env:
          VITE_PAGES_BASE: /deazuadesign-portfolio/apps/spanish/
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html

      - name: Assemble site (portfolio static + apps/spanish)
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.cursor' \
            --exclude='_site' \
            --exclude='spanish-app' \
            ./ _site/
          mkdir -p _site/apps/spanish
          cp -r spanish-app/dist/. _site/apps/spanish/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
