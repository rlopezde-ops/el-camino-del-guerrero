# workflow-id: portfolio-spanish-pages-v3
#
# BEFORE THIS WORKS: deazuadesign-portfolio → Settings → Pages → Build and deployment
# → Source MUST be "GitHub Actions" (not "Deploy from a branch"). Otherwise
# configure-pages fails with exit code 1.
#
# Public Spanish repo: no secret needed. Private: SPANISH_REPO_TOKEN (read access).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deazuadesign-portfolio
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout portfolio
        uses: actions/checkout@v4

      - name: Fetch Spanish app (git clone — avoids API "Not Found")
        env:
          PAT: ${{ secrets.SPANISH_REPO_TOKEN }}
        run: |
          set -euxo pipefail
          rm -rf spanish-app
          # Trim secret: a blank/whitespace-only secret would break x-access-token URLs
          TRIMMED="$(printf '%s' "$PAT" | tr -d ' \t\r\n')"
          if [ -n "$TRIMMED" ]; then
            git clone --depth 1 "https://x-access-token:${TRIMMED}@github.com/rlopezde-ops/el-camino-del-guerrero.git" spanish-app
          else
            git clone --depth 1 https://github.com/rlopezde-ops/el-camino-del-guerrero.git spanish-app
          fi
          test -f spanish-app/package.json
          test -f spanish-app/package-lock.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: spanish-app/package-lock.json

      - name: Install & build Spanish app
        working-directory: spanish-app
        env:
          VITE_PAGES_BASE: /deazuadesign-portfolio/apps/spanish/
        run: |
          set -euxo pipefail
          node --version
          npm --version
          npm ci
          npm run build
          cp dist/index.html dist/404.html
          test -f dist/index.html

      - name: Assemble site (portfolio + apps/spanish)
        run: |
          set -euxo pipefail
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.cursor' \
            --exclude='_site' \
            --exclude='spanish-app' \
            ./ _site/
          mkdir -p _site/apps/spanish
          cp -r spanish-app/dist/. _site/apps/spanish/
          : > _site/.nojekyll
          test -f _site/index.html
          test -f _site/apps/spanish/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
